const aiMatch = (kcalGap, protGap) => {
  const selected=[];
  let remKcal=Math.max(kcalGap,0), remProt=Math.max(protGap,0);
  const pool=[...FOOD_DB].sort((a,b)=>b[2]-a[2]);
  for(const food of pool){
    if(remProt<=0&&remKcal<=0) break;
    if(food[2]>0&&remProt>0){selected.push(food);remKcal-=food[1];remProt-=food[2];}
  }
  if(remKcal>0){
    const carbs=pool.filter(f=>f[4]==="碳水");
    for(const food of carbs){
      if(remKcal<=0) break;
      if(!selected.includes(food)){selected.push(food);remKcal-=food[1];}
    }
  }
  const totalKcal=selected.reduce((s,f)=>s+f[1],0);
  const totalProt=selected.reduce((s,f)=>s+f[2],0);
  return{items:selected.slice(0,4),totalKcal,totalProt};
};

};

const computeStreak=logs=>{
  if(!logs.length) return 0;
  const sorted=[...logs].sort((a,b)=>b.date.localeCompare(a.date));
  let count=0,cur=new Date();cur.setHours(0,0,0,0);
  for(const l of sorted){
    const ld=new Date(l.date+"T00:00:00");
    const diff=Math.round((cur-ld)/86400000);
    if(diff<=1){count++;cur=ld;}else break;
  }
  return count;
};

/* ══ HOOKS ══ */
function useRipple(){
  const ref=useRef(null);
  const fire=useCallback(e=>{
    const el=ref.current;if(!el)return;
    const rect=el.getBoundingClientRect();
    const size=Math.max(rect.width,rect.height);
    const dot=document.createElement("span");
    dot.className="ripple-dot";
    const cx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    const cy=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
    dot.style.cssText=`width:${size}px;height:${size}px;left:${cx-size/2}px;top:${cy-size/2}px`;
    el.appendChild(dot);setTimeout(()=>dot.remove(),600);
  },[]);
  return[ref,fire];
}

function useCountdown(seconds){
  const[time,setTime]=useState(seconds);
  useEffect(()=>{
    const t=setInterval(()=>setTime(s=>s<=1?seconds:s-1),1000);
    return()=>clearInterval(t);
  },[seconds]);
  const m=String(Math.floor(time/60)).padStart(2,"0");
  const s=String(time%60).padStart(2,"0");
  return`${m}:${s}`;
}

function Toast({msg,onDone}){
  const[out,setOut]=useState(false);
  useEffect(()=>{
    const t1=setTimeout(()=>setOut(true),2900);
    const t2=setTimeout(onDone,3300);
    return()=>{clearTimeout(t1);clearTimeout(t2);};
  },[]);
  return(
    <div className={out?"toast-out":"toast-in"} style={{position:"fixed",bottom:100,left:"50%",background:"#0e0e0e",border:"1.5px solid #CCFF00",borderRadius:16,padding:"14px 20px",maxWidth:340,width:"88%",fontSize:13,color:"#D1D5DB",lineHeight:1.8,zIndex:9999,boxShadow:"0 0 35px #ccff0035"}}>
      <span style={{color:"#CCFF00",fontWeight:900,marginRight:7}}>💬</span>{msg}
    </div>
  );
}

}

function App(){
  const[tab,setTab]=useState("calc");
  const[gender,setGender]=useState("male");
  const[weight,setWeight]=useState("");
  const[height,setHeight]=useState("");
  const[age,setAge]=useState("");
  const[act,setAct]=useState(1.55);
  const[goal,setGoal]=useState("muscle");
  const[res,setRes]=useState(null);
  const[animKey,setAnimKey]=useState(0);
  const[showPicks,setShowPicks]=useState(false);
  const[protInput,setProtInput]=useState("");
  const[showShare,setShowShare]=useState(false);
  const[logs,setLogs]=useState([]);
  const[streak,setStreak]=useState(0);
  const[saved,setSaved]=useState(false);
  const[toast,setToast]=useState(null);
  const[premiumFeature,setPremium]=useState(null);
  const[quote]=useState(()=>QUOTES[Math.floor(Math.random()*QUOTES.length)]);
  const[calcRef,calcRipple]=useRipple();
  const[saveRef,saveRipple]=useRipple();

  /* Load saved data */
  useEffect(()=>{
    const d=loadData();
    setLogs(d.logs);
    setStreak(computeStreak(d.logs));
    if(d.savedGoal) setGoal(d.savedGoal);
    if(d.savedForm){
      const f=d.savedForm;
      if(f.gender) setGender(f.gender);
      if(f.weight) setWeight(String(f.weight));
      if(f.height) setHeight(String(f.height));
      if(f.age)    setAge(String(f.age));
      if(f.act)    setAct(f.act);
    }
  },[]);

  /* Save goal + form on change */
  useEffect(()=>{
    const d=loadData();
    saveData({...d,savedGoal:goal});
  },[goal]);

  const handleCalc=e=>{
    calcRipple(e);
    const w=parseFloat(weight),h=parseFloat(height),a=parseInt(age);
    if(!w||!h||!a||w<20||h<100||a<10){setToast("請確認體重（≥20kg）、身高（≥100cm）、年齡（≥10）都已填寫！");return;}
    const bmr=gender==="male"?88.362+13.397*w+4.799*h-5.677*a:447.593+9.247*w+3.098*h-4.330*a;
    const tdee=Math.round(bmr*act);
    const lvl=tdee<1800?"low":tdee<2500?"medium":"high";
    const gc=getGoalCalc(tdee,goal);
    const newRes={
      tdee,goalTarget:gc.target,goalLabel:gc.label,goalColor:gc.color,
      bmi:(w/((h/100)**2)).toFixed(1),
      prot:Math.round(w*(goal==="cut"?1.6:goal==="keep"?1.6:1.8)),
      weight:w,age:a,
      comment:COACH_COMMENTS[gender][lvl][goal]||COACH_COMMENTS[gender][lvl].muscle,
      order:buildOrder(tdee,gc.target,Math.round(w*(goal==="cut"?1.6:1.8)),gender,goal),
    };
    setRes(newRes);
    setAnimKey(k=>k+1);setSaved(false);setShowPicks(false);setShowShare(false);setProtInput("");
    /* save form */
    const d=loadData();
    saveData({...d,savedForm:{gender,weight:w,height:h,age:a,act},savedGoal:goal});
  };

  const handleSave=e=>{
    saveRipple(e);
    if(!res) return;
    const today=isoToday();
    const prev=loadData().logs.filter(l=>l.date!==today);
    const next=[{date:today,label:isoLabel(today),tdee:res.tdee,goal:res.goalTarget,prot:res.prot},...prev].slice(0,MAX_DAYS);
    const st=computeStreak(next);
    const d=loadData();
    saveData({...d,logs:next,streak:st,lastDate:today});
    setLogs(next);setStreak(st);setSaved(true);
