function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return {...DEFAULT_STATE};
    const saved = JSON.parse(raw);
    return {...DEFAULT_STATE, ...saved};
  } catch(e) {
    return {...DEFAULT_STATE};
  }
}

function saveState(state) {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(state));
  } catch(e) {}
}

const isoToday = () => new Date().toISOString().slice(0,10);
const fmtDate  = iso => { const[,m,d]=iso.split("-"); return `${m}/${d}`; };

function calcTDEE(gender, weight, height, age, act, neaChecked) {
  const w=parseFloat(weight), h=parseFloat(height), a=parseInt(age);
  if (!w||!h||!a||w<20||h<100||a<10) return null;
  const bmr = gender==="male"
    ? 10*w + 6.25*h - 5*a + 5
    : 10*w + 6.25*h - 5*a - 161;
  const neaBonus = (neaChecked||[]).length * 80;
  return Math.round(bmr * act) + neaBonus;
}

function calcGoalTarget(tdee, goalId) {
  if (goalId==="muscle") return {target: tdee+300, label:"增肌目標", delta:"+300 kcal", color:"#CCFF00"};
  if (goalId==="cut")    return {target: Math.max(tdee-400,1200), label:"減脂目標", delta:"-400 kcal", color:"#FF9500"};
  return {target: tdee, label:"維持目標", delta:"±0 kcal", color:"#38BDF8"};
}

function calcProt(weight, goalId) {
  const w = parseFloat(weight);
  if (!w) return null;
  return Math.round(w * (goalId==="cut" ? 1.6 : 1.8));
}

function calcStreak(logs) {
  if (!logs||!logs.length) return 0;
  const sorted = [...logs].sort((a,b)=>b.date.localeCompare(a.date));
  let count = 0;
  let cur = new Date(); cur.setHours(0,0,0,0);
  for (const l of sorted) {
    const ld = new Date(l.date+"T00:00:00");
    if (Math.round((cur-ld)/86400000) <= 1) { count++; cur=ld; }
    else break;
  }
  return count;
}

/* ════════════════════════════════════
   RIPPLE HOOK
════════════════════════════════════ */
function useRipple() {
  const ref = useRef(null);
  const fire = useCallback(e => {
    const el = ref.current; if(!el) return;
    const r = el.getBoundingClientRect(), sz = Math.max(r.width, r.height);
    const dot = document.createElement("span"); dot.className="rd";
    const cx = (e.touches?e.touches[0].clientX:e.clientX)-r.left;
    const cy = (e.touches?e.touches[0].clientY:e.clientY)-r.top;
    dot.style.cssText = `width:${sz}px;height:${sz}px;left:${cx-sz/2}px;top:${cy-sz/2}px`;
    el.appendChild(dot); setTimeout(()=>dot.remove(), 550);
  },[]);
  return [ref, fire];
}

        <div style={{fontSize:11,color:"#6B7280",borderLeft:"2px solid #CCFF00",paddingLeft:9}}>{r.sub}</div>
      </div>
      <div style={{display:"flex",gap:8,marginTop:14}}>
        <button onClick={onTired} className="tap"
          style={{flex:1,padding:"11px 0",borderRadius:11,border:"1.5px solid #ccff0035",background:"transparent",color:"#CCFF00",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          <span>😮‍💨</span><span>我很累 / 心靈補給</span>
        </button>
        <button onClick={()=>window.open(LINKTREE,"_blank")} className="tap"
          style={{flexShrink:0,padding:"11px 14px",borderRadius:11,border:"none",background:"linear-gradient(135deg,#CCFF00,#aaee00)",color:"#000",fontSize:12,fontWeight:900,cursor:"pointer"}}>
          📅 預約
        </button>
      </div>
    </div>
  );
}

/* ════════════════════════════════════

════════════════════════════════════ */
function CalcTab({appState, setAppState, onToast, onNeedVip}) {
  const {gender,weight,height,age,act,goal,neaChecked,logs,isVip} = appState;

  const setGender  = v => setAppState(s=>({...s,gender:v}));
  const setWeight  = v => setAppState(s=>({...s,weight:v}));
  const setHeight  = v => setAppState(s=>({...s,height:v}));
  const setAge     = v => setAppState(s=>({...s,age:v}));
  const setAct     = v => setAppState(s=>({...s,act:v}));
  const setGoal    = v => setAppState(s=>({...s,goal:v}));
  const toggleNea  = id => setAppState(s=>{
    const n = s.neaChecked.includes(id) ? s.neaChecked.filter(x=>x!==id) : [...s.neaChecked,id];
    return {...s,neaChecked:n};
  });

  const tdee = calcTDEE(gender, weight, height, age, act, neaChecked);
  const gc   = tdee ? calcGoalTarget(tdee, goal) : null;
  const prot = calcProt(weight, goal);
  const bmi  = (weight&&height) ? (parseFloat(weight)/((parseFloat(height)/100)**2)).toFixed(1) : null;
  const streak = calcStreak(logs);

  const [res, setRes]       = useState(null);
  const [animKey, setAnimKey] = useState(0);
  const [saved, setSaved]   = useState(false);
  const [showShare, setShowShare] = useState(false);
  const [calcRef,calcFire]  = useRipple();
  const [saveRef,saveFire]  = useRipple();

  const handleCalc = e => {
    calcFire(e);
    if (!tdee) { onToast("請確認體重（≥20kg）、身高（≥100cm）、年齡（≥10）！"); return; }
    const neaBonus = neaChecked.length * 80;
    setRes({tdee, goalTarget:gc.target, goalLabel:gc.label, goalColor:gc.color, goalDelta:gc.delta, prot, bmi, weight:parseFloat(weight), neaBonus});
    setAnimKey(k=>k+1); setSaved(false); setShowShare(false);
  };

  const handleSave = e => {
    saveFire(e);
    if (!res) return;
    const today = isoToday();
    const prev  = (appState.logs||[]).filter(l=>l.date!==today);
    const next  = [{date:today,label:fmtDate(today),tdee:res.tdee,goal:res.goalTarget,prot:res.prot},...prev].slice(0,30);
    const newStreak = calcStreak(next);
    setAppState(s=>({...s,logs:next}));
    setSaved(true);
    onToast(newStreak>=7 ? `🔥 第 ${newStreak} 天！你現在是前 5%！` : `✅ 戰果回報！教練說：水分也要補足 💧`);
  };

  const COMMENT = {
    male:{low:"兄弟，代謝偏低代表肌肉量不足。每公斤補 1.8g 蛋白質，搭配重訓，三個月後你會認不出自己。",medium:"基礎到位！熱量盈餘 300kcal + 漸進超負荷，你的逆襲才剛啟動。",high:"強者！代謝旺盛是天賦。每公斤 2g 蛋白質，週 4 練，六個月後你就是傳說。"},
    female:{low:"姐妹，別怕吃！代謝低先喚醒肌肉，從優質蛋白質開始，找對方法才是關鍵。",medium:"很棒的基礎！每天多 250kcal，堅持 90 天，體態會讓人驚訝。",high:"運動員代謝！別讓熱量不足阻礙你，你完全可以擁有讓人羨慕的體態。"},
  };
  const tdeeLevel = tdee ? (tdee<1800?"low":tdee<2500?"medium":"high") : "medium";
  const gi = GOALS.find(g=>g.id===goal)||GOALS[0];

/* ════════════════════════════════════
   TAB: TRACK (今日追蹤)
════════════════════════════════════ */
function TrackTab({appState, setAppState, onToast}) {
  const {goal, trackEntries=[]} = appState;

  // Derive target from saved TDEE result if exists
  const logs = appState.logs||[];
  const todayLog = logs.find(l=>l.date===isoToday());
  const targetKcal = todayLog?.goal || 2000;
  const targetProt = todayLog?.prot || 130;

  const totalKcal = trackEntries.reduce((s,e)=>s+e.kcal,0);
  const totalProt = trackEntries.reduce((s,e)=>s+e.prot,0);
  const remKcal   = Math.max(targetKcal - totalKcal, 0);
  const pctKcal   = Math.min((totalKcal/targetKcal)*100, 100);
  const pctProt   = Math.min((totalProt/targetProt)*100, 100);
  const overKcal  = totalKcal > targetKcal;

  const [customName, setCustomName] = useState("");
  const [customKcal, setCustomKcal] = useState("");
  const [customProt, setCustomProt] = useState("");
  const [showCustom, setShowCustom] = useState(false);
  const [showReport, setShowReport] = useState(false);
  const [copied, setCopied] = useState(false);

  const addEntry = (name, kcal, prot) => {
    const entry = {id:Date.now(), name, kcal:parseInt(kcal)||0, prot:parseInt(prot)||0, time:new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"})};
    setAppState(s=>({...s, trackEntries:[...(s.trackEntries||[]),entry]}));
    onToast(`✅ 已記錄：${name} · ${entry.kcal}kcal`);
  };

  const removeEntry = (id) => setAppState(s=>({...s, trackEntries:(s.trackEntries||[]).filter(e=>e.id!==id)}));

  const addCustom = () => {
    if (!customName.trim()||!customKcal) { onToast("請填寫食物名稱和卡路里！"); return; }
    addEntry(customName.trim(), customKcal, customProt||0);
    setCustomName(""); setCustomKcal(""); setCustomProt(""); setShowCustom(false);
  };

  const clearToday = () => setAppState(s=>({...s, trackEntries:[]}));

  const reportText = [
    `📊 大衛教練 | 今日飲食追蹤報表`,
    `📅 日期：${new Date().toLocaleDateString("zh-TW")}`,
    ``,
    `📥 飲食紀錄：`,
    ...(trackEntries.length ? trackEntries.map(e=>`  ${e.time} · ${e.name}：${e.kcal}kcal / 蛋白${e.prot}g`) : ["  （今日尚無紀錄）"]),
    ``,
    `📈 今日合計：${totalKcal} kcal / 蛋白質 ${totalProt}g`,
    `🎯 目標：${targetKcal} kcal / 蛋白質 ${targetProt}g`,
    `✅ 達成率：熱量 ${Math.round(pctKcal)}% · 蛋白質 ${Math.round(pctProt)}%`,
    overKcal ? `⚠️ 今日超標 ${totalKcal-targetKcal} kcal，明日注意調整。` : `💪 今日還可攝取 ${remKcal} kcal，繼續加油！`,
    ``,
    `— 透過大衛教練 AI 增肌決策系統 v6.3 生成`,
  ].join("\n");

  const copyReport = () => {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(reportText).then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),2000); });
    } else {
      const ta = document.createElement("textarea");
      ta.value = reportText; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
      setCopied(true); setTimeout(()=>setCopied(false),2000);
    }
  };

  const gi = GOALS.find(g=>g.id===goal)||GOALS[0];

  return (
    <div>
      {/* Progress */}
      <div className="card">
        <div style={{fontSize:13,fontWeight:900,color:"#CCFF00",marginBottom:14}}>📊 今日進度</div>

          <div style={{fontSize:11,color:"#4B5563",marginBottom:12,padding:"8px 11px",background:"rgba(255,149,0,.07)",borderRadius:9,border:"1px solid rgba(255,149,0,.2)",lineHeight:1.8}}>

function AITab({appState, setAppState, onNeedVip}) {
  const {goal, isVip, logs=[]} = appState;
  const todayLog = logs.find(l=>l.date===isoToday());

  const res = todayLog ? {
    tdee:todayLog.tdee,
    goalLabel:todayLog.goal+"kcal",
    prot:todayLog.prot,
  } : null;

  const [msgs,    setMsgs]    = useState([]);
  const [inp,     setInp]     = useState("");
  const [busy,    setBusy]    = useState(false);
  const [showPhoto, setShowPhoto] = useState(false);
  const [showVipPrompt, setShowVipPrompt] = useState(false);
  const [showUnlock, setShowUnlock] = useState(false);
  const botRef = useRef(null);
  const gi = GOALS.find(g=>g.id===goal)||GOALS[0];

  const QUICK_Q = ["今天蛋白質不夠怎麼辦？","訓練前吃什麼最好？","休息日要怎麼吃？","超商怎麼湊足蛋白質？","睡前補充什麼？","怎麼用外食達標？"];

  const SYS = {
    muscle:`你是大衛教練的增肌助手，說繁體中文。強調：熱量盈餘300kcal、每公斤1.8g蛋白質、漸進超負荷。語氣積極有力，每次回覆150字內，可條列式。`,
    cut:   `你是大衛教練的減脂助手，說繁體中文。強調：缺口400kcal、高蛋白保肌、飽足感。語氣務實支持，每次回覆150字內。`,
    keep:  `你是大衛教練的維持助手，說繁體中文。強調：TDEE平衡、動作品質。每次回覆150字內。`,
  };

  useEffect(()=>{
    setMsgs([{from:"coach",text:`嗨！我是大衛教練的 AI 助手 💪\n目前模式：${gi.icon} ${gi.label}${res?`\nTDEE ${res.tdee}kcal，蛋白質目標 ${res.prot}g/日`:""}\n\n有任何飲食或訓練問題，直接問我！`}]);
  },[goal]);

  useEffect(()=>{ botRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs,busy]);

  const send = async (q) => {
    if (!q.trim()||busy) return;
    setMsgs(m=>[...m,{from:"user",text:q}]); setInp(""); setBusy(true);
    const ctx = res ? `\n用戶數據：TDEE=${res.tdee}，蛋白質目標=${res.prot}g/日` : "";
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          system:SYS[goal]+ctx,
          messages:[{role:"user",content:q}]
        })
      });
      const d = await r.json();
      const txt = d.content?.map(c=>c.type==="text"?c.text:"").join("")||"暫時無法回覆，請稍後再試。";
      setMsgs(m=>[...m,{from:"coach",text:txt}]);
    } catch(e) {
      setMsgs(m=>[...m,{from:"coach",text:"網路連線問題，請稍後再試 💪"}]);
    }
    setBusy(false);
  };

  const handlePhotoClick = () => {
    if (isVip) { setShowPhoto(true); }
    else { setShowVipPrompt(true); }
  };

  return (
    <div>
      {showPhoto && isVip && <PhotoAuditModal res={res} onClose={()=>setShowPhoto(false)}/>}
      {showVipPrompt && (
        <VIPPromptModal
          feature="AI 拍照送大衛教練審核"
          onClose={()=>setShowVipPrompt(false)}
          onGoLine={()=>{lineConsult();setShowVipPrompt(false);}}
          onGoUnlock={()=>{setShowVipPrompt(false);setShowUnlock(true);}}
        />
      )}
      {showUnlock && (
        <VIPUnlockModal
          onUnlock={()=>{setAppState(s=>({...s,isVip:true}));setShowUnlock(false);}}
          onClose={()=>setShowUnlock(false)}
        />
      )}

      <div className="card" style={{marginBottom:14}}><GoalSelector goal={goal} setGoal={v=>setAppState(s=>({...s,goal:v}))}/></div>

      {/* Chat */}
      <div style={{background:"#0a0a0a",borderRadius:16,border:`1.5px solid ${gi.color}20`,overflow:"hidden",marginBottom:14}}>
        <div style={{padding:"12px 14px",borderBottom:"1px solid #1a1a1a",display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,background:"#CCFF00",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>🤖</div>
          <div>
            <div style={{fontSize:13,fontWeight:900,color:"#CCFF00"}}>AI 教練決策助手</div>
            <div style={{fontSize:10,color:"#4B5563"}}>{gi.icon} {gi.label}模式 · Claude AI 驅動</div>

  const [tiredOpen, setTiredOpen] = useState(false);

  // Wrap setAppState to always persist
  const setAppState = useCallback((updater) => {

      const next = typeof updater === "function" ? updater(prev) : {...prev,...updater};
      saveState(next);
      return next;
