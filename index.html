function useRipple(){
  const ref=useRef(null);
  const fire=useCallback(e=>{
    const el=ref.current;if(!el)return;
    const rect=el.getBoundingClientRect();
    const size=Math.max(rect.width,rect.height);
    const dot=document.createElement("span");
    dot.className="ripple-dot";
    const cx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    const cy=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
    dot.style.cssText=`width:${size}px;height:${size}px;left:${cx-size/2}px;top:${cy-size/2}px`;
    el.appendChild(dot);setTimeout(()=>dot.remove(),600);
  },[]);
  return [ref,fire];
}

/* Monthly Report */
function MonthlyReport({logs,targetProt,onPremium}){
  if(logs.length<3) return null;
  const avg=k=>Math.round(logs.reduce((s,l)=>s+l[k],0)/logs.length);
  const hit=targetProt?logs.filter(l=>l.prot>=targetProt).length:0;
  const rate=targetProt?Math.round((hit/logs.length)*100):null;
  const rc=rate===null?"#888":rate>=80?"#CCFF00":rate>=50?"#FF9500":"#FF4444";
  const grade=!rate?{i:"📊",t:"持續記錄中，分析趨勢中…"}:rate>=80?{i:"🏆",t:`達標率 ${rate}%！習慣已養成！`}:rate>=50?{i:"📈",t:`達標率 ${rate}%，先確保早餐蛋白質到位。`}:{i:"⚠️",t:`達標率 ${rate}%。意識到問題就贏了一半。`};
  return(
    <div style={{background:"#0a0a0a",borderRadius:14,padding:16,marginTop:14,border:"1.5px solid #ccff0022"}}>
      <div style={{fontSize:13,fontWeight:900,color:"#CCFF00",marginBottom:13}}>📅 月度評估（{logs.length} 天）</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
        {[["均 TDEE",avg("tdee"),"kcal","#00BFFF"],["均蛋白質",avg("prot"),"g","#FF9500"],["達標率",rate!==null?`${rate}%`:"—","",rc]].map(([l,v,u,c])=>(
          <div key={l} style={{background:"#111",borderRadius:10,padding:"10px 8px",border:`1px solid ${c}22`,position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,${c},transparent)`}}/>
            <div style={{fontSize:9,color:"#444",letterSpacing:1.2,marginBottom:5}}>{l}</div>
            <div style={{fontSize:20,fontWeight:900,color:c,lineHeight:1}}>{v}</div>
            <div style={{fontSize:9,color:"#333",marginTop:2}}>{u}</div>
          </div>
        ))}
      </div>
      <div style={{background:"#111",borderRadius:10,padding:"11px 13px",borderLeft:"3px solid #CCFF00",marginBottom:12}}>
        <span style={{fontSize:14,marginRight:8}}>{grade.i}</span>
        <span style={{fontSize:12,color:"#bbb",lineHeight:1.8}}>{grade.t}</span>
      </div>
      {/* Premium locked: trend chart */}
      <button onClick={()=>onPremium("30 天數據趨勢圖")} style={{width:"100%",padding:"12px 0",background:"linear-gradient(135deg,#FFD70018,#FF880010)",border:"1px solid #FFD70044",borderRadius:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,WebkitTapHighlightColor:"transparent"}}>
        <span style={{fontSize:14}}>📈</span>
        <span style={{fontSize:13,fontWeight:800,background:"linear-gradient(135deg,#FFD700,#FF8800)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>解鎖 30 天趨勢圖表</span>

  );
}

            <div style={{fontSize:18,fontWeight:900,color:c,lineHeight:1}}>{v}</div>

        ))}
      </div>

      {[["💪 訓練組數",vol.sets],["📅 訓練頻率",vol.freq],["🏃 有氧建議",vol.cardio],["🎯 教練建議",vol.note]].map(([l,v])=>(
        <div key={l} style={{display:"flex",gap:10,padding:"8px 0",borderBottom:"1px solid #111",alignItems:"flex-start"}}>

      ))}
    </div>
  );
}

/* ════════════════════════════════════════════
   MAIN APP
════════════════════════════════════════════ */
function App(){
  /* form */
  const [tab,    setTab]    = useState("calc");
  const [gender, setGender] = useState("male");
  const [weight, setWeight] = useState("");
  const [height, setHeight] = useState("");
  const [age,    setAge]    = useState("");
  const [act,    setAct]    = useState(1.55);
  /* results */
  const [res,       setRes]       = useState(null);
  const [animKey,   setAnimKey]   = useState(0);
  const [showPicks, setShowPicks] = useState(false);
  const [protInput, setProtInput] = useState("");
  const [showShare, setShowShare] = useState(false);
  /* persist */
  const [logs,   setLogs]   = useState([]);
  const [streak, setStreak] = useState(0);
  const [saved,  setSaved]  = useState(false);
  /* ui */
  const [toast,      setToast]      = useState(null);
  const [premiumFeature, setPremium] = useState(null);
  const [quote] = useState(()=>QUOTES[Math.floor(Math.random()*QUOTES.length)]);
  /* ripple */
  const [calcRef,calcRipple] = useRipple();
  const [saveRef,saveRipple] = useRipple();

  useEffect(()=>{
    const d=loadData();
    setLogs(d.logs);
    setStreak(computeStreak(d.logs));
  },[]);

  /* ── handlers ── */
  const handleCalc=e=>{
    calcRipple(e);
    const w=parseFloat(weight),h=parseFloat(height),a=parseInt(age);
    if(!w||!h||!a||w<20||h<100||a<10){setToast("請確認體重（≥20kg）、身高（≥100cm）、年齡（≥10）都已填寫！");return;}
    const bmr=gender==="male"?88.362+13.397*w+4.799*h-5.677*a:447.593+9.247*w+3.098*h-4.330*a;
    const tdee=Math.round(bmr*act);
    const lvl=tdee<1800?"low":tdee<2500?"medium":"high";
    setRes({tdee,goal:tdee+300,bmi:(w/((h/100)**2)).toFixed(1),prot:Math.round(w*1.8),weight:w,age:a,comment:COACH_COMMENTS[gender][lvl],order:buildOrder(tdee,tdee+300,Math.round(w*1.8),gender)});
    setAnimKey(k=>k+1);setSaved(false);setShowPicks(false);setShowShare(false);setProtInput("");
  };

  const handleSave=e=>{
    saveRipple(e);
    if(!res)return;
    const today=isoToday();
    const prev=loadData().logs.filter(l=>l.date!==today);
    const next=[{date:today,label:isoLabel(today),tdee:res.tdee,goal:res.goal,prot:res.prot},...prev].slice(0,MAX_DAYS);
    const st=computeStreak(next);
    saveData({logs:next,streak:st,lastDate:today});
    setLogs(next);setStreak(st);setSaved(true);
    setToast(st>=7?`🔥 第 ${st} 天！黃金火焰燃燒中——你現在是前 5% 的人！`:`✅ 戰果回報完成！大衛教練提醒：水分也要補足 💧`);
  };

  const handleClear=()=>{
    localStorage.removeItem(LS_KEY);
    setLogs([]);setStreak(0);setSaved(false);
    setToast("重新開機完成！明天是大衛教練帶你變強的新開始 💪");
  };

  /* derived */
  const isFlame  = streak>=7;
  const ctaClass = isFlame?"glow-flame ripple-host":"glow-green ripple-host";
  const eaten    = parseFloat(protInput)||0;
  const gap      = res?Math.max(0,res.prot-eaten):0;
  const picks    = res?getQuickPicks(gap):null;

  /* styles */
  const C = {
    card:{background:"#0d0d0d",borderRadius:14,padding:16,marginBottom:12,border:"1.5px solid #ccff0018"},
    lbl: {fontSize:10,color:"#CCFF00",letterSpacing:3,fontWeight:700,marginBottom:10,display:"block"},
    tap: {WebkitTapHighlightColor:"transparent"},
  };

  return(
    <div style={{background:"#000",minHeight:"100vh"}}>
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
      {premiumFeature&&<PremiumModal feature={premiumFeature} onClose={()=>setPremium(null)}/>}

      <div style={{maxWidth:480,margin:"0 auto"}}>

        {/* ───── HEADER ───── */}
        <div style={{background:"linear-gradient(180deg,#111 0%,#000 100%)",borderBottom:"1px solid #ccff0018",padding:"18px 16px 14px"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
            <div style={{width:46,height:46,flexShrink:0,borderRadius:13,background:"linear-gradient(135deg,#CCFF00,#aaee00)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,boxShadow:"0 0 22px #ccff0050"}}>💪</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:22,fontWeight:900,color:"#CCFF00",letterSpacing:2,lineHeight:1}}>大衛教練</div>
              <div style={{fontSize:10,color:"#555",letterSpacing:2,marginTop:3}}>AI 增肌決策系統 · v4.0 · 2026</div>
            </div>
            {streak>0&&(
              <div className="badge-pop" style={{flexShrink:0,padding:"5px 10px",borderRadius:20,fontSize:11,fontWeight:800,background:isFlame?"linear-gradient(135deg,#ff8800,#ffdd00)":"#ccff0022",color:isFlame?"#000":"#CCFF00",border:`1px solid ${isFlame?"#ffaa00":"#ccff0040"}`}}>
                {isFlame?"🔥":"⚡"}{streak}天
              </div>
            )}
          </div>
          <div className="quote-anim" style={{padding:"10px 14px",background:"#0a0a0a",borderRadius:10,borderLeft:"3px solid #CCFF00",fontSize:12,color:"#666",fontStyle:"italic",lineHeight:1.75}}>{quote}</div>
          <div style={{height:1,background:"linear-gradient(90deg,#CCFF00,transparent)",marginTop:12}}/>
        </div>

        {/* ───── TABS ───── */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:5,padding:"11px 14px 0"}}>
          {[["calc","📊 計算"],["ai","🤖 AI"],["info","📚 資訊"],["dining","🍽️ 外食"]].map(([id,lbl])=>(
            <button key={id} onClick={()=>setTab(id)} style={{padding:"10px 2px",borderRadius:10,border:tab===id?"none":"1px solid #1f1f1f",cursor:"pointer",fontSize:11,fontWeight:800,letterSpacing:.3,transition:"all .2s",background:tab===id?"#CCFF00":"transparent",color:tab===id?"#000":"#555",...C.tap}}>{lbl}</button>
          ))}
        </div>

        <div style={{padding:"14px 16px 130px"}}>

          {/* ════════ TAB: CALC ════════ */}
