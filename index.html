const parseNLP=(text)=>{
  const t=text.toLowerCase();
  const matched=[];let tK=0,tP=0,tF=0,tC=0;
  for(const f of FOOD_DB){
    const kws=f[0].toLowerCase().replace(/[（）()]/g,"").split(/[\s\/]/);
    const main=kws[0]; if(main.length<2)continue;
    if(!t.includes(main))continue;
    let qty=1,scale=1;
    const numM=t.match(/(\d+(?:\.\d+)?)\s*(?:個|顆|份|碗|杯|包|片|塊|根|條)/);
    if(numM)qty=parseFloat(numM[1]);
    const mlM=t.match(/(\d+)\s*(?:ml|毫升)/);
    if(mlM&&f[0].includes("ml")){const fm=parseInt(f[0].match(/(\d+)ml/)?.[1]||"250");scale=parseInt(mlM[1])/fm;qty=1;}
    const gM=t.match(/(\d+)\s*(?:g|公克|克)/);
    if(gM&&f[0].includes("100g")){scale=parseInt(gM[1])/100;qty=1;}
    const k=Math.round(f[1]*qty*scale),p=Math.round(f[2]*qty*scale),ff=Math.round(f[3]*qty*scale),c=Math.round(f[4]*qty*scale);
    matched.push({name:f[0],qty,kcal:k,prot:p,fat:ff,carb:c});
    tK+=k;tP+=p;tF+=ff;tC+=c;
  }
  return{matched,totalKcal:tK,totalProt:tP,totalFat:tF,totalCarb:tC};
};

/* ═══════════════════════════════════
   HOOKS
═══════════════════════════════════ */
function useRipple(){
  const ref=useRef(null);
  const fire=useCallback(e=>{
    const el=ref.current;if(!el)return;
    const rect=el.getBoundingClientRect(),size=Math.max(rect.width,rect.height);
    const dot=document.createElement("span");dot.className="rd";
    const cx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    const cy=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
    dot.style.cssText=`width:${size}px;height:${size}px;left:${cx-size/2}px;top:${cy-size/2}px`;
    el.appendChild(dot);setTimeout(()=>dot.remove(),620);
  },[]);
  return[ref,fire];
}

/* NLP Food */
function NLPFood({goal,isVip,onNeedVip}){
  const[text,setText]=useState("");
  const[result,setResult]=useState(null);
  const[loading,setLoading]=useState(false);
  const[history,setHistory]=useState([]);
  const gi=GOALS.find(g=>g.id===goal)||GOALS[0];
  const ex=["我喝了 450ml 的無糖豆漿","我吃了一個排骨便當","吃了滷雞腿加白飯","中午火鍋，牛肉片 150g"];
  const calc=()=>{
    if(!text.trim())return;setLoading(true);
    setTimeout(()=>{
      const r=parseNLP(text);
      if(!r.matched.length){setResult({err:"未找到對應食物。試試：「吃了雞胸肉100g」或「喝了無糖豆漿500ml」"});}
      else{setResult(r);setHistory(h=>[{text,kcal:r.totalKcal,prot:r.totalProt},...h].slice(0,5));}
      setLoading(false);
    },550);
  };
  return(
    <div className="card" style={{border:`1.5px solid ${gi.color}20`}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:13}}>
        <div style={{width:36,height:36,background:`${gi.color}12`,borderRadius:11,display:"flex",alignItems:"center",justifyContent:"center",fontSize:19,border:`1px solid ${gi.color}22`,flexShrink:0}}>🥘</div>
        <div><div style={{fontSize:14,fontWeight:900,color:gi.color}}>自然語言飲食換算</div><div style={{fontSize:10,color:"#6B7280"}}>說出你吃了什麼，AI 自動計算</div></div>
      </div>
      <textarea value={text} onChange={e=>setText(e.target.value)} placeholder={"輸入你吃了什麼，例如：\n「我喝了 450ml 無糖豆漿」\n「吃了滷雞腿加白飯」"}
        style={{width:"100%",background:"#141414",border:"1px solid #2a2a2a",borderRadius:12,color:"#D1D5DB",padding:"12px 13px",fontSize:13,fontFamily:"inherit",lineHeight:1.75,height:86,marginBottom:10}}/>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:11}}>
        {ex.slice(0,3).map(e=>(
          <button key={e} onClick={()=>setText(e)} className="tap"
            style={{padding:"5px 9px",background:"#141414",border:"1px solid #222",borderRadius:20,fontSize:10,color:"#6B7280",cursor:"pointer"}}>
            {e.slice(0,13)}…
          </button>
        ))}
      </div>
      <button onClick={calc} disabled={loading||!text.trim()} className={`rh tap ${!loading&&text.trim()?"gg":""}`}
        style={{width:"100%",padding:13,background:loading||!text.trim()?"#1a1a1a":"linear-gradient(135deg,#CCFF00,#aaee00)",border:"none",borderRadius:11,cursor:loading||!text.trim()?"default":"pointer",fontSize:14,fontWeight:900,color:loading||!text.trim()?"#333":"#000",transition:"all .2s"}}>
        {loading?"⚡ AI 分析中…":"🔍 計算營養"}
      </button>
      {result&&(
        <div className="au" style={{marginTop:12}}>
          {result.err?(
            <div style={{background:"#1a0808",borderRadius:11,padding:"11px 13px",border:"1px solid #FF444425",fontSize:12,color:"#FF4444"}}>{result.err}</div>
          ):(
            <div style={{background:"#0d0d0d",borderRadius:12,padding:"13px 13px",border:`1px solid ${gi.color}20`}}>

function MonthlyReport({logs,targetProt,onNeedVip}){
  if(logs.length<3)return null;
  const avg=k=>Math.round(logs.reduce((s,l)=>s+l[k],0)/logs.length);
  const hit=targetProt?logs.filter(l=>l.prot>=targetProt).length:0;
  const rate=targetProt?Math.round((hit/logs.length)*100):null;
  const rc=rate===null?"#6B7280":rate>=80?"#CCFF00":rate>=50?"#FF9500":"#FF4444";
  const grade=!rate?{i:"📊",t:"持續記錄中…"}:rate>=80?{i:"🏆",t:`達標率 ${rate}%！習慣已養成！`}:rate>=50?{i:"📈",t:`達標率 ${rate}%，先確保早餐蛋白質到位。`}:{i:"⚠️",t:`達標率 ${rate}%，意識到問題就贏了一半。`};
  return(
    <div style={{background:"#0a0a0a",borderRadius:14,padding:17,marginTop:14,border:"1.5px solid #ccff0016"}}>
      <div style={{fontSize:13,fontWeight:900,color:"#CCFF00",marginBottom:13}}>📅 月度評估（{logs.length}天）</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
        {[["均TDEE",avg("tdee"),"kcal","#38BDF8"],["均蛋白質",avg("prot"),"g","#FF9500"],["達標率",rate!==null?`${rate}%`:"—","",rc]].map(([l,v,u,c])=>(
          <div key={l} style={{background:"#111",borderRadius:10,padding:"10px 9px",border:`1px solid ${c}16`,position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,${c},transparent)`}}/>
            <div style={{fontSize:9,color:"#4B5563",letterSpacing:1.2,marginBottom:5}}>{l}</div>
            <div style={{fontSize:21,fontWeight:900,fontFamily:"'Bebas Neue',sans-serif",color:c,letterSpacing:1}}>{v}</div>
            <div style={{fontSize:9,color:"#374151",marginTop:2}}>{u}</div>
          </div>
        ))}
      </div>
      <div style={{background:"#111",borderRadius:10,padding:"11px 13px",borderLeft:"3px solid #CCFF00",marginBottom:12}}>
        <span style={{fontSize:13,marginRight:7}}>{grade.i}</span>
        <span style={{fontSize:12,color:"#D1D5DB",lineHeight:1.85}}>{grade.t}</span>
      </div>
      <button onClick={()=>onNeedVip("30 天數據趨勢圖")} className="tap"
        style={{width:"100%",padding:"12px 0",background:"linear-gradient(135deg,rgba(255,215,0,.08),rgba(255,136,0,.06))",border:"1px solid rgba(255,215,0,.28)",borderRadius:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        <span style={{fontSize:14}}>📈</span>
        <span style={{fontSize:13,fontWeight:800,background:"linear-gradient(135deg,#FFD700,#FF8800)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>解鎖 30 天趨勢圖</span>
        <span style={{fontSize:10,fontWeight:900,background:"linear-gradient(135deg,#FFD700,#FF8800)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>🔐 VIP</span>
      </button>
    </div>
  );
}

function App(){

  const[goal,setGoal]=useState("muscle");
  const[res,setRes]=useState(null);
  const[animKey,setAnimKey]=useState(0);
  const[showShare,setShowShare]=useState(false);
  const[logs,setLogs]=useState([]);

  const[vipActivated,setVipActivated]=useState(false);
  const[tiredOpen,setTiredOpen]=useState(false);
  const[photoAuditOpen,setPhotoAuditOpen]=useState(false);
  const[calcRef,calcFire]=useRipple();
  const[saveRef,saveFire]=useRipple();

  useEffect(()=>{
    const d=loadD();
    setLogs(d.logs||[]);setStreak(calcStreak(d.logs||[]));
    if(d.savedGoal)setGoal(d.savedGoal);
    if(d.isVip)setIsVip(true);
    if(d.savedForm){const f=d.savedForm;if(f.gender)setGender(f.gender);if(f.weight)setWeight(String(f.weight));if(f.height)setHeight(String(f.height));if(f.age)setAge(String(f.age));if(f.act)setAct(f.act);}
  },[]);

  useEffect(()=>{const d=loadD();saveD({...d,savedGoal:goal});},[goal]);

  const handleNeedVip=feature=>setPremiumModal(feature);

  const handleUnlock=()=>{
    setIsVip(true);setUnlockOpen(false);setPremiumModal(null);setVipActivated(true);
    const d=loadD();saveD({...d,isVip:true});
  };

  const handlePhotoAudit=()=>{
    if(isVip){setPhotoAuditOpen(true);}
    else{handleNeedVip("AI 拍照送教練審核");}
  };

  const getGoalCalc=(tdee,g)=>{
    if(g==="muscle")return{target:tdee+300,label:"增肌目標",color:"#CCFF00"};
    if(g==="cut")return{target:Math.max(tdee-400,1200),label:"減脂目標",color:"#FF9500"};
    return{target:tdee,label:"維持目標",color:"#38BDF8"};
  };

  const handleCalc=e=>{
    calcFire(e);
    const w=parseFloat(weight),h=parseFloat(height),a=parseInt(age);
    if(!w||!h||!a||w<20||h<100||a<10){setToast("請確認體重（≥20kg）、身高（≥100cm）、年齡（≥10）！");return;}
    const bmr=gender==="male"?88.362+13.397*w+4.799*h-5.677*a:447.593+9.247*w+3.098*h-4.330*a;
    const tdee=Math.round(bmr*act);
    const gc=getGoalCalc(tdee,goal);
    const prot=Math.round(w*(goal==="cut"?1.6:1.8));
    const COMM={male:{low:"兄弟，代謝偏低代表肌肉量不足。每公斤補 1.6g 蛋白質，搭配重訓，三個月後你會認不出自己。",medium:"基礎到位！每天盈餘 300kcal，漸進超負荷訓練，你的逆襲才剛啟動。",high:"強者！代謝旺盛是天賦。每公斤 2g 蛋白質，週 4 練，六個月後你就是傳說。"},female:{low:"姐妹，別怕吃！代謝低先喚醒肌肉，從優質蛋白質開始。",medium:"很棒的基礎！每天多 250kcal，堅持 90 天，體態讓人驚訝。",high:"運動員代謝！別讓熱量不足阻礙你，擁有讓人羨慕的體態。"}};
    const lvl=tdee<1800?"low":tdee<2500?"medium":"high";
    setRes({tdee,goalTarget:gc.target,goalLabel:gc.label,goalColor:gc.color,bmi:(w/((h/100)**2)).toFixed(1),prot,weight:w,age:a,comment:COMM[gender][lvl]});
    setAnimKey(k=>k+1);setSaved(false);setShowShare(false);
    const d=loadD();saveD({...d,savedForm:{gender,weight:w,height:h,age:a,act},savedGoal:goal});
  };

  const handleSave=e=>{
    saveFire(e);if(!res)return;
    const today=isoToday();
    const prev=loadD().logs.filter(l=>l.date!==today);

    const st=calcStreak(next);

  };

                  {ok:true,item:"麥辣雞腿堡 + 玉米杯",why:"29g 蛋白質，薯條換玉米省 280kcal"},

                  {ok:false,item:"薯條 + 含糖飲料",why:"高GI + 精製糖，雙重地雷"},
                ]},
              ].map(g=>(
                <div key={g.store} style={{marginBottom:14,background:"#0a0a0a",borderRadius:16,overflow:"hidden",border:`1px solid ${g.color}18`}}>

                    <span style={{fontSize:17}}>{g.icon}</span>

                  <div style={{padding:"12px 14px"}}>
                    {g.items.map((item,i)=>(
                      <div key={i} style={{display:"flex",gap:10,padding:"8px 0",borderBottom:i<g.items.length-1?"1px solid #111":"none",alignItems:"flex-start"}}>

                      </div>

                </div>
              ))}

              {/* locked premium guide */}
              <div style={{position:"relative",borderRadius:16,overflow:"hidden",marginBottom:14}}>
                <div className="blk" style={{padding:18,background:"#0a0a0a",borderRadius:16,border:"1px solid #1f1f1f"}}>
                  {["火鍋增肌點菜完整指南","自助餐蛋白質最大化策略","夜市吃不胖完整攻略","便當店點法 SOP","飯局喝酒後急救方案","訓練日 vs 休息日外食差異"].map((c,i)=>(
                    <div key={i} style={{fontSize:12,color:"#333",padding:"5px 0",borderBottom:"1px solid #0f0f0f",display:"flex",gap:8}}><span>▸</span>{c}</div>
                  ))}
                  <div style={{height:45}}/>
                </div>
                <div className="lov">
                  <div style={{fontSize:32}}>🔒</div>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:16,fontWeight:900,color:"#F9FAFB",marginBottom:4}}>6 大場景完整攻略</div>
                    <div style={{fontSize:11,color:"#9CA3AF",lineHeight:1.85}}>大衛教練親自設計的科學邏輯</div>
                  </div>
                  <button onClick={()=>handleNeedVip("私藏外食完整攻略")} className="rh gg tap"
                    style={{padding:"13px 26px",background:"linear-gradient(135deg,#CCFF00,#aaee00)",border:"none",borderRadius:12,cursor:"pointer",fontSize:14,fontWeight:900,color:"#000",textAlign:"center",lineHeight:1.7}}>
                    💬 LINE 解鎖 NT$199
                  </button>
                </div>
              </div>

              {/* golden rules */}
              <div style={{background:"#0d0d0a",borderRadius:16,padding:18,border:"1.5px solid #ccff0020"}}>
                <div style={{fontSize:14,fontWeight:900,color:"#CCFF00",marginBottom:14}}>⚡ 黃金法則（免費放送）</div>
                {["每餐蛋白質：體重 × 0.4g，缺口靠蛋和豆漿補","碳水控制：一個拳頭大小 = 一份，不過量","進食順序：蛋白質 → 蔬菜 → 碳水，血糖穩定","訓練日多吃 200–300kcal 碳水，促進合成","睡前補充 20–30g 酪蛋白，夜間增肌不停歇"].map((r,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"10px 0",borderBottom:i<4?"1px solid #111":"none"}}>
                    <div style={{width:25,height:25,background:"#CCFF00",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,color:"#000",flexShrink:0,marginTop:1}}>{i+1}</div>
                    <div style={{fontSize:13,color:"#D1D5DB",lineHeight:1.75}}>{r}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>

      {/* Float CTA */}
      <button className="tap gg" onClick={lineConsult}

        <span style={{fontSize:20}}>💬</span>
        <div style={{textAlign:"left"}}>
          <div style={{fontSize:13,fontWeight:900}}>LINE 大衛教練</div>
          <div style={{fontSize:10,fontWeight:600,opacity:.65}}>預約 · 取得解鎖碼</div>
        </div>
      </button>
    </div>
  );
}
