/* NLP parser */
const parseNLP = (text) => {
  const t = text.toLowerCase();
  const matched = [];
  let totalKcal = 0, totalProt = 0, totalFat = 0, totalCarb = 0;
  for (const food of FOOD_DB) {
    const kws = food[0].toLowerCase().replace(/[（）()]/g,"").split(/[\s\/]/);
    const main = kws[0];
    if (main.length < 2) continue;
    if (t.includes(main)) {
      let qty = 1, scale = 1;
      const numM = t.match(/(\d+(?:\.\d+)?)\s*(?:個|顆|份|碗|杯|包|片|塊|根|條)/);
      if (numM) qty = parseFloat(numM[1]);
      const mlM = t.match(/(\d+)\s*(?:ml|毫升)/);
      if (mlM && food[0].includes("ml")) {
        const foodMl = parseInt(food[0].match(/(\d+)ml/)?.[1] || "250");
        scale = parseInt(mlM[1]) / foodMl; qty = 1;
      }
      const gM = t.match(/(\d+)\s*(?:g|公克|克)/);
      if (gM && food[0].includes("100g")) { scale = parseInt(gM[1]) / 100; qty = 1; }
      const k = Math.round(food[1]*qty*scale), p = Math.round(food[2]*qty*scale),
            f = Math.round(food[3]*qty*scale), c = Math.round(food[4]*qty*scale);
      matched.push({name:food[0], qty, kcal:k, prot:p, fat:f, carb:c});
      totalKcal+=k; totalProt+=p; totalFat+=f; totalCarb+=c;
    }
  }
  return {matched, totalKcal, totalProt, totalFat, totalCarb};
};

  if (!logs.length) return 0;
  const s = [...logs].sort((a,b)=>b.date.localeCompare(a.date));
  let c=0, cur=new Date(); cur.setHours(0,0,0,0);
  for (const l of s) {
    const ld=new Date(l.date+"T00:00:00");
    if (Math.round((cur-ld)/86400000)<=1){c++;cur=ld;}else break;
  }
  return c;
};

/* ════════════════════════════
   HOOKS
════════════════════════════ */
function useRipple() {
  const ref = useRef(null);
  const fire = useCallback(e => {
    const el = ref.current; if (!el) return;
    const rect=el.getBoundingClientRect(), size=Math.max(rect.width,rect.height);
    const dot=document.createElement("span"); dot.className="rd";
    const cx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    const cy=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
    dot.style.cssText=`width:${size}px;height:${size}px;left:${cx-size/2}px;top:${cy-size/2}px`;
    el.appendChild(dot); setTimeout(()=>dot.remove(), 620);
  }, []);
  return [ref, fire];
}

/* ── AI Chat ── */
function AIChat({res,goal}) {
  const [msgs,setMsgs]=useState([]);
  const [inp,setInp]=useState("");
  const [busy,setBusy]=useState(false);
  const bot=useRef(null);
  const gi=GOALS.find(g=>g.id===goal)||GOALS[0];
  const QA=["我還差 300 大卡怎麼補？","訓練前吃什麼最好？","今天蛋白質不夠怎麼辦？","休息日要怎麼吃？","睡前補充什麼？","怎麼用外食達標？"];

  useEffect(()=>{
    setMsgs([{from:"coach",text:`嗨！我是大衛教練的 AI 助手 💪\n目前模式：${gi.icon} ${gi.label}\n\n有任何飲食或訓練問題，直接問我！`}]);
  },[goal]);

  useEffect(()=>{ bot.current?.scrollIntoView({behavior:"smooth"}); },[msgs,busy]);

  const CTX = {
    muscle:"你是大衛教練的增肌專家助手。強調：熱量盈餘300kcal、每公斤1.8g蛋白質、漸進超負荷。語氣積極有力。繁體中文，150字內，條列式。",
    cut:"你是大衛教練的減脂專家助手。強調：熱量缺口400kcal、高蛋白保肌、飽足感食物。語氣務實支持。繁體中文，150字內。",
    keep:"你是大衛教練的體態維持助手。強調：TDEE平衡、動作品質、長期穩定。繁體中文，150字內。",
    none:"你是大衛教練的AI助手，專精增肌減脂。給予科學實用建議。繁體中文，150字內，條列式。",
  };

  const send = async q => {
    if (!q.trim()||busy) return;
    setMsgs(m=>[...m,{from:"user",text:q}]);
    setInp(""); setBusy(true);
    const sys = CTX[goal]||CTX.none;
    const uctx = res ? `用戶：TDEE=${res.tdee}，目標=${res.goalTarget}，蛋白質=${res.prot}g/日` : "";
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:`${sys}${uctx?"\n"+uctx:""}`,messages:[{role:"user",content:q}]}),
      });
      const d = await r.json();
      setMsgs(m=>[...m,{from:"coach",text:d.content?.map(c=>c.text||"").join("")||"暫時無法回覆，請稍後再試。"}]);
    } catch { setMsgs(m=>[...m,{from:"coach",text:"網路連線問題，請稍後再試 💪"}]); }
    setBusy(false);
  };

  return (
    <div style={{background:"#0a0a0a",borderRadius:16,border:`1.5px solid ${gi.color}22`,overflow:"hidden",marginBottom:14}}>
      <div style={{padding:"12px 16px",borderBottom:"1px solid #1a1a1a",display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:34,height:34,background:"#CCFF00",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>🤖</div>
        <div>
          <div style={{fontSize:13,fontWeight:900,color:"#CCFF00"}}>AI 教練決策助手</div>
          <div style={{fontSize:10,color:"#4B5563"}}>{gi.icon} {gi.label}模式 · Powered by Claude AI</div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:5}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:"#CCFF00",animation:"glowG 2s ease-in-out infinite"}}/>
          <span style={{fontSize:10,color:"#CCFF00"}}>線上</span>
        </div>
      </div>
      <div style={{height:230,overflowY:"auto",padding:"13px 13px 6px",display:"flex",flexDirection:"column",gap:10}}>
        {msgs.map((m,i)=>(
          <div key={i} className="cb" style={{display:"flex",justifyContent:m.from==="user"?"flex-end":"flex-start"}}>
            {m.from==="coach"&&<div style={{width:28,height:28,background:"#CCFF00",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0,marginRight:8,alignSelf:"flex-end"}}>🤖</div>}
            <div style={{maxWidth:"82%",padding:"10px 13px",borderRadius:m.from==="user"?"14px 14px 4px 14px":"14px 14px 14px 4px",background:m.from==="user"?"#CCFF00":"#161616",color:m.from==="user"?"#000":"#D1D5DB",fontSize:12,lineHeight:1.85,fontWeight:m.from==="user"?700:400,whiteSpace:"pre-wrap",border:m.from==="coach"?"1px solid #ccff0018":"none"}}>{m.text}</div>
          </div>
        ))}
        {busy&&(
          <div className="cb" style={{display:"flex",alignItems:"flex-end",gap:8}}>
            <div style={{width:28,height:28,background:"#CCFF00",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>🤖</div>
            <div style={{background:"#161616",borderRadius:"14px 14px 14px 4px",padding:"10px 14px",border:"1px solid #ccff0018",display:"flex",gap:4}}>
              {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:"#CCFF00",animation:`dotP 1.2s ease-in-out ${i*.2}s infinite`}}/>)}
            </div>
          </div>
        )}
        <div ref={bot}/>
      </div>
      <div style={{padding:"8px 13px",borderTop:"1px solid #1a1a1a",display:"flex",gap:5,flexWrap:"wrap"}}>
        {QA.slice(0,4).map(q=>(
          <button key={q} onClick={()=>send(q)} className="tap"
            style={{padding:"5px 10px",background:"#141414",border:"1px solid #ccff0025",borderRadius:20,cursor:"pointer",fontSize:10,color:"#CCFF00",fontWeight:700}}>
            {q}
          </button>
        ))}
      </div>
      <div style={{padding:"10px 13px",borderTop:"1px solid #1a1a1a",display:"flex",gap:7}}>
        <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(inp);}}}
          placeholder="問大衛教練任何問題…"
          style={{flex:1,background:"#141414",border:"1px solid #2a2a2a",borderRadius:10,color:"#D1D5DB",padding:"10px 12px",fontSize:12,fontFamily:"inherit"}}/>
        <button onClick={()=>send(inp)} disabled={busy||!inp.trim()} className="tap"
          style={{padding:"10px 14px",background:busy||!inp.trim()?"#1a1a1a":"#CCFF00",border:"none",borderRadius:10,cursor:busy||!inp.trim()?"default":"pointer",fontSize:13,fontWeight:900,color:busy||!inp.trim()?"#333":"#000",transition:"all .2s"}}>
          {busy?"…":"送出"}
        </button>
      </div>
    </div>
  );
}

/* ── NLP Food ── */
function NLPFood({goal, isVip, onNeedVip, onQuery}) {
  const [text,setText]=useState("");
  const [result,setResult]=useState(null);
  const [loading,setLoading]=useState(false);
  const [history,setHistory]=useState([]);
  const [showScan,setShowScan]=useState(false);
  const gi=GOALS.find(g=>g.id===goal)||GOALS[0];
  const ex=["我喝了 450ml 的無糖豆漿","我吃了一個排骨便當，只吃肉","吃了滷雞腿加白飯 200g","中午火鍋，牛肉片 150g + 豆腐"];

  const calc=()=>{
    if(!text.trim())return;
    setLoading(true);
    setTimeout(()=>{
      const r=parseNLP(text);
      if(!r.matched.length){setResult({err:"未找到對應食物。試試：「我吃了雞胸肉100g」或「喝了無糖豆漿500ml」"});}
      else{setResult(r);setHistory(h=>[{text,kcal:r.totalKcal,prot:r.totalProt},...h].slice(0,5));onQuery&&onQuery();}
      setLoading(false);
    },550);
  };

  return (
    <div className="card" style={{border:`1.5px solid ${gi.color}22`}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <div style={{width:38,height:38,background:`${gi.color}15`,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,border:`1px solid ${gi.color}28`,flexShrink:0}}>🥘</div>
        <div>
          <div style={{fontSize:14,fontWeight:900,color:gi.color}}>自然語言飲食換算</div>
          <div style={{fontSize:10,color:"#6B7280"}}>說出你吃了什麼，AI 自動計算</div>
        </div>
      </div>
      {/* AI Scan button */}
      <button onClick={()=>{ isVip?setShowScan(true):onNeedVip("AI 拍照辨識"); }} className="rh tap"
        style={{width:"100%",padding:"12px 0",borderRadius:12,border:"1.5px dashed #ccff0035",background:"transparent",color:isVip?"#CCFF00":"#4B5563",fontSize:13,fontWeight:700,cursor:"pointer",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        <span style={{fontSize:18}}>📷</span>
        <span>AI 拍照分析</span>
        {!isVip&&<span style={{fontSize:10,background:"linear-gradient(135deg,#FFD700,#FF8800)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",fontWeight:900,marginLeft:4}}>🔐 VIP</span>}
      </button>
      {/* text input */}
      <textarea value={text} onChange={e=>setText(e.target.value)} placeholder={"輸入你吃了什麼，例如：\n「我喝了 450ml 無糖豆漿」\n「吃了滷雞腿加白飯」"}
        style={{width:"100%",background:"#141414",border:"1px solid #2a2a2a",borderRadius:12,color:"#D1D5DB",padding:"12px 13px",fontSize:13,fontFamily:"inherit",lineHeight:1.75,height:88,marginBottom:10}}/>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:12}}>
        {ex.slice(0,3).map(e=>(
          <button key={e} onClick={()=>setText(e)} className="tap"
            style={{padding:"5px 9px",background:"#141414",border:"1px solid #222",borderRadius:20,fontSize:10,color:"#6B7280",cursor:"pointer"}}>
            {e.slice(0,14)}…
          </button>
        ))}
      </div>
      <button onClick={calc} disabled={loading||!text.trim()} className={`rh tap ${!loading&&text.trim()?"gg":""}`}
        style={{width:"100%",padding:13,background:loading||!text.trim()?"#1a1a1a":"linear-gradient(135deg,#CCFF00,#aaee00)",border:"none",borderRadius:12,cursor:loading||!text.trim()?"default":"pointer",fontSize:14,fontWeight:900,color:loading||!text.trim()?"#333":"#000",transition:"all .2s"}}>
        {loading?"⚡ AI 分析中…":"🔍 計算營養"}
      </button>
      {result&&(
        <div className="au" style={{marginTop:12}}>
          {result.err?(
            <div style={{background:"#1a0808",borderRadius:11,padding:"11px 13px",border:"1px solid #FF444428",fontSize:12,color:"#FF4444"}}>{result.err}</div>
          ):(
            <div style={{background:"#0d0d0d",borderRadius:12,padding:"13px 13px",border:`1px solid ${gi.color}22`}}>
              <div style={{fontSize:12,fontWeight:900,color:gi.color,marginBottom:10}}>✅ 辨識結果</div>
              {result.matched.map((f,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #1a1a1a",fontSize:12}}>
                  <span style={{color:"#D1D5DB"}}>{f.name}{f.qty>1?` ×${f.qty}`:""}</span>
                  <div style={{display:"flex",gap:6}}>
                    <span style={{color:"#CCFF00",fontWeight:700}}>{f.kcal}kcal</span>
                    <span style={{color:"#FF9500",fontWeight:700}}>{f.prot}g蛋白</span>

              <div style={{display:"flex",justifyContent:"space-between",marginTop:10,paddingTop:10,borderTop:"1.5px solid #2a2a2a"}}>
                <span style={{fontSize:13,fontWeight:800,color:"#D1D5DB"}}>合計</span>
                <div style={{display:"flex",gap:10}}>
                  <span style={{fontSize:18,fontWeight:900,fontFamily:"'Bebas Neue',sans-serif",color:"#CCFF00",letterSpacing:1}}>{result.totalKcal} kcal</span>
                  <span style={{fontSize:18,fontWeight:900,fontFamily:"'Bebas Neue',sans-serif",color:"#FF9500",letterSpacing:1}}>{result.totalProt}g 蛋白</span>
                </div>
              </div>
              <div style={{marginTop:10,fontSize:11,color:"#9CA3AF"}}>脂肪 {result.totalFat}g · 碳水 {result.totalCarb}g</div>
            </div>
          )}
        </div>
      )}
      {history.length>0&&(
        <div style={{marginTop:12}}>
          <div style={{fontSize:10,color:"#4B5563",letterSpacing:1.5,marginBottom:7}}>最近紀錄</div>
          {history.map((h,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#6B7280",padding:"5px 0",borderBottom:"1px solid #141414"}}>
              <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:175}}>{h.text}</span>
              <span style={{color:"#CCFF00",flexShrink:0,marginLeft:8}}>{h.kcal}kcal/{h.prot}g</span>
            </div>
          ))}
        </div>
      )}
      {showScan&&<ScanModal onClose={()=>setShowScan(false)}/>}
    </div>
  );
}

function MonthlyReport({logs,targetProt,onNeedVip}) {
  if(logs.length<3)return null;
  const avg=k=>Math.round(logs.reduce((s,l)=>s+l[k],0)/logs.length);
  const hit=targetProt?logs.filter(l=>l.prot>=targetProt).length:0;
  const rate=targetProt?Math.round((hit/logs.length)*100):null;
  const rc=rate===null?"#6B7280":rate>=80?"#CCFF00":rate>=50?"#FF9500":"#FF4444";
  const grade=!rate?{i:"📊",t:"持續記錄中…"}:rate>=80?{i:"🏆",t:`達標率 ${rate}%！習慣已養成！`}:rate>=50?{i:"📈",t:`達標率 ${rate}%，先確保早餐蛋白質到位。`}:{i:"⚠️",t:`達標率 ${rate}%，意識到問題就贏了一半。`};
  return(
    <div style={{background:"#0a0a0a",borderRadius:14,padding:17,marginTop:14,border:"1.5px solid #ccff0018"}}>
      <div style={{fontSize:13,fontWeight:900,color:"#CCFF00",marginBottom:13}}>📅 月度評估（{logs.length}天）</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
        {[["均TDEE",avg("tdee"),"kcal","#38BDF8"],["均蛋白質",avg("prot"),"g","#FF9500"],["達標率",rate!==null?`${rate}%`:"—","",rc]].map(([l,v,u,c])=>(
          <div key={l} style={{background:"#111",borderRadius:10,padding:"10px 9px",border:`1px solid ${c}18`,position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,${c},transparent)`}}/>
            <div style={{fontSize:9,color:"#4B5563",letterSpacing:1.2,marginBottom:5}}>{l}</div>
            <div style={{fontSize:21,fontWeight:900,fontFamily:"'Bebas Neue',sans-serif",color:c,letterSpacing:1}}>{v}</div>
            <div style={{fontSize:9,color:"#374151",marginTop:2}}>{u}</div>
          </div>
        ))}
      </div>
      <div style={{background:"#111",borderRadius:10,padding:"11px 13px",borderLeft:"3px solid #CCFF00",marginBottom:12}}>
        <span style={{fontSize:13,marginRight:7}}>{grade.i}</span>
        <span style={{fontSize:12,color:"#D1D5DB",lineHeight:1.85}}>{grade.t}</span>
      </div>
      <button onClick={()=>onNeedVip("30 天數據趨勢圖")} className="tap"
        style={{width:"100%",padding:"12px 0",background:"linear-gradient(135deg,#FFD70012,#FF88000c)",border:"1px solid #FFD70035",borderRadius:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        <span style={{fontSize:14}}>📈</span>
        <span style={{fontSize:13,fontWeight:800,background:"linear-gradient(135deg,#FFD700,#FF8800)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>解鎖 30 天趨勢圖表</span>
        <span style={{fontSize:10,fontWeight:900,background:"linear-gradient(135deg,#FFD700,#FF8800)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>🔐 VIP</span>
      </button>
    </div>
  );
}

function App() {
  /* tabs */

  const [height,setHeight]=useState("");
  const [age,setAge]=useState("");
  const [act,setAct]=useState(1.55);
  const [goal,setGoal]=useState("muscle");
  /* results */
  const [res,setRes]=useState(null);
  const [animKey,setAnimKey]=useState(0);
  const [showShare,setShowShare]=useState(false);
  /* persist */
  const [logs,setLogs]=useState([]);
  const [streak,setStreak]=useState(0);
  const [saved,setSaved]=useState(false);
  const [nlpCount,setNlpCount]=useState(0);
  /* VIP */
  const [isVip,setIsVip]=useState(false);
  /* modals */
  const [toast,setToast]=useState(null);
  const [premiumModal,setPremiumModal]=useState(null);  // feature name
  const [unlockOpen,setUnlockOpen]=useState(false);
  const [vipActivated,setVipActivated]=useState(false);
  const [tiredOpen,setTiredOpen]=useState(false);
  const [showConsult,setShowConsult]=useState(false);
  /* ripple */
  const [calcRef,calcFire]=useRipple();
  const [saveRef,saveFire]=useRipple();

  /* Load */
  useEffect(()=>{
    const d=loadD();
    setLogs(d.logs||[]); setStreak(calcStreak(d.logs||[]));
    if(d.savedGoal) setGoal(d.savedGoal);
    if(d.savedForm){const f=d.savedForm;if(f.gender)setGender(f.gender);if(f.weight)setWeight(String(f.weight));if(f.height)setHeight(String(f.height));if(f.age)setAge(String(f.age));if(f.act)setAct(f.act);}
    if(d.nlpCount) setNlpCount(d.nlpCount);
    if(d.isVip)    setIsVip(true);
  },[]);

  useEffect(()=>{const d=loadD();saveD({...d,savedGoal:goal});},[goal]);

  const handleNLPQuery = useCallback(()=>{
    const n=nlpCount+1; setNlpCount(n);
    const d=loadD(); saveD({...d,nlpCount:n});
    if(n>=3&&!showConsult) setShowConsult(true);
  },[nlpCount,showConsult]);

  const handleNeedVip = (feature) => {
    setPremiumModal(feature);
  };

  const handleUnlock = () => {
    setIsVip(true);
    setUnlockOpen(false);
    setPremiumModal(null);
    setVipActivated(true);
    const d=loadD(); saveD({...d,isVip:true});
  };

  const getGoalCalc=(tdee,g)=>{
    if(g==="muscle")return{target:tdee+300,label:"增肌目標",color:"#CCFF00"};
    if(g==="cut")   return{target:Math.max(tdee-400,1200),label:"減脂目標",color:"#FF9500"};
    return{target:tdee,label:"維持目標",color:"#38BDF8"};
  };

  const handleCalc=e=>{
    calcFire(e);
    const w=parseFloat(weight),h=parseFloat(height),a=parseInt(age);
    if(!w||!h||!a||w<20||h<100||a<10){setToast("請確認體重（≥20kg）、身高（≥100cm）、年齡（≥10）！");return;}
    const bmr=gender==="male"?88.362+13.397*w+4.799*h-5.677*a:447.593+9.247*w+3.098*h-4.330*a;
    const tdee=Math.round(bmr*act);
    const gc=getGoalCalc(tdee,goal);
    const prot=Math.round(w*(goal==="cut"?1.6:1.8));
    const COMM={male:{low:"兄弟，代謝偏低代表肌肉量不足。每公斤補 1.6g 蛋白質，搭配重訓，三個月後你會認不出自己。",medium:"基礎到位！每天盈餘 300kcal，漸進超負荷訓練，你的逆襲才剛啟動。",high:"強者！代謝旺盛是天賦。每公斤 2g 蛋白質，週 4 練，六個月後你就是傳說。"},female:{low:"姐妹，別怕吃！代謝低先喚醒肌肉，從優質蛋白質開始，教練陪你練出線條。",medium:"很棒的基礎！每天多 250kcal，堅持 90 天，體態讓人驚訝。",high:"運動員代謝！別讓熱量不足阻礙你，擁有讓人羨慕的體態。"}};
    const lvl=tdee<1800?"low":tdee<2500?"medium":"high";
    setRes({tdee,goalTarget:gc.target,goalLabel:gc.label,goalColor:gc.color,bmi:(w/((h/100)**2)).toFixed(1),prot,weight:w,age:a,comment:COMM[gender][lvl]});
    setAnimKey(k=>k+1); setSaved(false); setShowShare(false);
    const d=loadD(); saveD({...d,savedForm:{gender,weight:w,height:h,age:a,act},savedGoal:goal});
  };

  const handleSave=e=>{
    saveFire(e); if(!res)return;
    const today=isoToday();
    const prev=loadD().logs.filter(l=>l.date!==today);
    const next=[{date:today,label:isoLbl(today),tdee:res.tdee,goal:res.goalTarget,prot:res.prot},...prev].slice(0,MAX_DAYS);
    const st=calcStreak(next);
    const d=loadD(); saveD({...d,logs:next,streak:st,lastDate:today});
    setLogs(next); setStreak(st); setSaved(true);
    setToast(st>=7?`🔥 第 ${st} 天！黃金火焰燃燒——你現在是前 5%！`:`✅ 戰果回報！大衛教練提醒：水分也要補足 💧`);
  };

  const handleClear=()=>{ const d=loadD();saveD({...d,logs:[],streak:0,lastDate:""});setLogs([]);setStreak(0);setSaved(false);setToast("重新開機！新的篇章從今天開始 💪"); };

  const isFlame=streak>=7;
  const gi=GOALS.find(g=>g.id===goal)||GOALS[0];
  const lbl={fontSize:10,color:"#CCFF00",letterSpacing:3,fontWeight:700,marginBottom:10,display:"block"};

  return (
    <div style={{background:"linear-gradient(160deg,#0e0e0e 0%,#080808 42%,#0c0c08 72%,#080808 100%)",minHeight:"100vh",position:"relative",zIndex:1}}>

      {tiredOpen&&<TiredModal onClose={()=>setTiredOpen(false)}/>}
      {premiumModal&&<PremiumModal feature={premiumModal} onClose={()=>setPremiumModal(null)} onShowUnlock={()=>setUnlockOpen(true)}/>}
      {unlockOpen&&<VIPUnlockModal onUnlock={handleUnlock} onClose={()=>setUnlockOpen(false)}/>}
      {vipActivated&&<VIPActivated onClose={()=>setVipActivated(false)}/>}

      <div style={{maxWidth:480,margin:"0 auto"}}>

        {/* ── HEADER ── */}
        <div style={{background:"linear-gradient(180deg,#141410 0%,#0a0a08 100%)",borderBottom:"1px solid #ccff0012",padding:"18px 18px 14px"}}>
          <div style={{display:"flex",alignItems:"center",gap:13,marginBottom:12}}>

            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:26,fontWeight:900,color:"#CCFF00",fontFamily:"'Bebas Neue',sans-serif",letterSpacing:3,lineHeight:1}}>大衛教練</div>
              <div style={{fontSize:10,color:"#4B5563",letterSpacing:2,marginTop:4}}>虛擬分身助教 · v6.0 · 2026</div>
